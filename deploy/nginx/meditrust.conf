server {
    listen 80;
    listen [::]:80;
    server_name meditrust.ddns.net 13.217.107.106;

    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name meditrust.ddns.net 13.217.107.106;

    root /var/www/meditrust;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/meditrust.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meditrust.ddns.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /api {
        return 301 /api/;
    }

    location ^~ /api/ {
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # Compatibility redirects for cached clients still using root-level API paths.
    location ^~ /auth/ {
        return 308 /api$request_uri;
    }

    location ^~ /dashboard/ {
        return 308 /api$request_uri;
    }

    location ^~ /predictions/ {
        return 308 /api$request_uri;
    }

    location ^~ /patients/ {
        return 308 /api$request_uri;
    }

    location ^~ /cases/ {
        return 308 /api$request_uri;
    }

    location ^~ /doctor/ {
        return 308 /api$request_uri;
    }

    location = /predict {
        return 308 /api/predict;
    }

    location = /assess {
        return 308 /api/assess;
    }

    # Keep old admin API routes working for cached admin pages while static /admin pages remain available.
    location = /admin/users {
        if ($http_x_admin_email = "") {
            return 302 /admin/users/index.html;
        }

        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin/users/ {
        return 302 /admin/users/index.html;
    }

    location = /admin/users/index.html {
        try_files /admin/users/index.html =404;
    }

    location = /admin/users/pending-requests {
        return 302 /admin/users/pending-requests/index.html;
    }

    location = /admin/users/pending-requests/ {
        return 302 /admin/users/pending-requests/index.html;
    }

    location = /admin/users/pending-requests/index.html {
        try_files /admin/users/pending-requests/index.html =404;
    }

    location = /admin/users/registered-users {
        return 302 /admin/users/registered-users/index.html;
    }

    location = /admin/users/registered-users/ {
        return 302 /admin/users/registered-users/index.html;
    }

    location = /admin/users/registered-users/index.html {
        try_files /admin/users/registered-users/index.html =404;
    }

    location = /admin/users/doctor-nurse-assignments {
        return 302 /admin/users/doctor-nurse-assignments/index.html;
    }

    location = /admin/users/doctor-nurse-assignments/ {
        return 302 /admin/users/doctor-nurse-assignments/index.html;
    }

    location = /admin/users/doctor-nurse-assignments/index.html {
        try_files /admin/users/doctor-nurse-assignments/index.html =404;
    }

    location ~ ^/admin/users/[0-9]+(?:/role|/role-status)?$ {
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin/doctor-nurse-assignments {
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/admin/doctor-nurse-assignments/[0-9]+$ {
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /db-health {
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8000/db-health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /docs {
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /docs/ {
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8000/docs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
