<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workflow Coming Soon | MediTrust</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .coming-soon-shell {
      position: relative;
      z-index: 2;
      width: min(92%, 520px);
    }

    .coming-soon-card {
      background: rgba(10, 19, 35, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 36px 30px;
      text-align: center;
      color: #eaf2ff;
    }

    .coming-soon-card h1 {
      margin: 0 0 12px;
      font-size: 30px;
      font-weight: 700;
    }

    .coming-soon-card p {
      margin: 0 0 24px;
      color: rgba(234, 242, 255, 0.82);
      line-height: 1.6;
      font-size: 15px;
    }

    .coming-soon-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .coming-soon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 150px;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .coming-soon-btn.primary {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }

    .coming-soon-btn.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #eaf2ff;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .coming-soon-btn:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body class="dashboard-page">
  <div class="page-bg"></div>
  <div class="page-overlay"></div>

  <main class="coming-soon-shell">
    <section class="coming-soon-card">
      <h1>Workflow Coming Soon</h1>
      <p>
        This clinical workflow module is currently under development.
        It will support role-based review actions, triage handling, and guided escalation inside MediTrust.
      </p>

      <div class="coming-soon-actions">
        <a href="index.html" class="coming-soon-btn secondary">Back to Login</a>
        <a href="meditrust.html" class="coming-soon-btn primary">Open Assessment</a>
      </div>
    </section>
  </main>
</body>
</html>
