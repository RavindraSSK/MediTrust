<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediTrust | Change Password</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <div class="page-bg"></div>
  <div class="page-overlay"></div>

  <main class="page-shell">
    <section class="login-card">
      <header class="login-header">
        <h1 class="brand-title">MediTrust</h1>
        <div class="header-divider"></div>
        <h2 class="portal-title">Change Password</h2>
        <p class="portal-subtitle">
          Update the password for your current clinician account.
        </p>
      </header>

      <form id="changePasswordForm" class="login-form" novalidate>
        <div class="field">
          <label for="email">Work Email</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="Enter your work email" required />
          </div>
        </div>

        <div class="field">
          <label for="currentPassword">Current Password</label>
          <div class="input-wrap">
            <input type="password" id="currentPassword" placeholder="Enter current password" required />
            <button type="button" id="toggleCurrentPassword" class="password-toggle" aria-label="Toggle current password visibility">
              <svg id="currentEyeOpenIcon" viewBox="0 0 24 24" fill="none">
                <path d="M2 12C4.2 7.8 7.8 5 12 5C16.2 5 19.8 7.8 22 12C19.8 16.2 16.2 19 12 19C7.8 19 4.2 16.2 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              </svg>
              <svg id="currentEyeClosedIcon" viewBox="0 0 24 24" fill="none" class="hidden-icon">
                <path d="M3 3L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M10.6 6.3C11.06 6.1 11.53 6 12 6C16.2 6 19.8 8.8 22 13C21.15 14.62 20.05 15.95 18.74 16.93" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14.12 14.12C13.58 14.66 12.82 15 12 15C10.34 15 9 13.66 9 12C9 11.18 9.34 10.42 9.88 9.88" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M6.06 9.26C4.75 10.23 3.66 11.52 2.82 13C5.02 17.2 8.4 20 12 20C13.96 20 15.81 19.17 17.38 17.74" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="newPassword">New Password</label>
          <div class="input-wrap">
            <input type="password" id="newPassword" placeholder="Minimum 8 characters" required />
            <button type="button" id="toggleChangePassword" class="password-toggle" aria-label="Toggle new password visibility">
              <svg id="changeEyeOpenIcon" viewBox="0 0 24 24" fill="none">
                <path d="M2 12C4.2 7.8 7.8 5 12 5C16.2 5 19.8 7.8 22 12C19.8 16.2 16.2 19 12 19C7.8 19 4.2 16.2 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              </svg>
              <svg id="changeEyeClosedIcon" viewBox="0 0 24 24" fill="none" class="hidden-icon">
                <path d="M3 3L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M10.6 6.3C11.06 6.1 11.53 6 12 6C16.2 6 19.8 8.8 22 13C21.15 14.62 20.05 15.95 18.74 16.93" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14.12 14.12C13.58 14.66 12.82 15 12 15C10.34 15 9 13.66 9 12C9 11.18 9.34 10.42 9.88 9.88" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M6.06 9.26C4.75 10.23 3.66 11.52 2.82 13C5.02 17.2 8.4 20 12 20C13.96 20 15.81 19.17 17.38 17.74" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div id="passwordRules" class="password-rules"></div>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="input-wrap">
            <input type="password" id="confirmPassword" placeholder="Re-enter new password" required />
            <button type="button" id="toggleChangeConfirmPassword" class="password-toggle" aria-label="Toggle confirm password visibility">
              <svg id="changeConfirmEyeOpenIcon" viewBox="0 0 24 24" fill="none">
                <path d="M2 12C4.2 7.8 7.8 5 12 5C16.2 5 19.8 7.8 22 12C19.8 16.2 16.2 19 12 19C7.8 19 4.2 16.2 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              </svg>
              <svg id="changeConfirmEyeClosedIcon" viewBox="0 0 24 24" fill="none" class="hidden-icon">
                <path d="M3 3L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M10.6 6.3C11.06 6.1 11.53 6 12 6C16.2 6 19.8 8.8 22 13C21.15 14.62 20.05 15.95 18.74 16.93" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14.12 14.12C13.58 14.66 12.82 15 12 15C10.34 15 9 13.66 9 12C9 11.18 9.34 10.42 9.88 9.88" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M6.06 9.26C4.75 10.23 3.66 11.52 2.82 13C5.02 17.2 8.4 20 12 20C13.96 20 15.81 19.17 17.38 17.74" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="changePasswordMessage" class="form-message" aria-live="polite"></div>

        <button type="submit" class="signin-btn">Change Password</button>
      </form>
    </section>
  </main>

  <script type="module" src="js/auth/change-password.js?v=20260429c"></script>
</body>
</html>
