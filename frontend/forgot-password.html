<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediTrust | Forgot Password</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <div class="page-bg"></div>
  <div class="page-overlay"></div>

  <main class="page-shell">
    <section class="login-card">
      <header class="login-header">
        <h1 class="brand-title">MediTrust</h1>
        <div class="header-divider"></div>
        <h2 class="portal-title">Forgot Password</h2>
        <p class="portal-subtitle">
          Enter your work email to receive a password reset code.
        </p>
      </header>

      <form id="forgotPasswordForm" class="login-form" novalidate>
        <div class="field">
          <label for="email">Work Email</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="Enter your work email" required />
          </div>
        </div>

        <div id="forgotPasswordMessage" class="form-message" aria-live="polite"></div>

        <button type="submit" class="signin-btn">Send Reset Code</button>
      </form>

      <div class="section-line"></div>

      <div class="secondary-row">
        <p>
          Already have your code?
          <a href="reset-password.html" class="text-link strong-link">Reset Password</a>
        </p>
      </div>
    </section>
  </main>

  <script type="module" src="js/auth/forgot-password.js"></script>
</body>
</html>
