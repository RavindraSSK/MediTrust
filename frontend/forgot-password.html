<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediTrust | Forgot Password</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <div class="page-bg"></div>
  <div class="page-overlay"></div>

  <main class="page-shell">
    <section class="login-card">
      <header class="login-header">
        <h1 class="brand-title">MediTrust</h1>
        <div class="header-divider"></div>
        <h2 class="portal-title">Forgot Password</h2>
        <p class="portal-subtitle">
          Enter your work email to receive a 6-digit password reset code.
        </p>
      </header>

      <form id="forgotPasswordForm" class="login-form" novalidate>
        <div class="field">
          <label for="email">Work Email</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="Enter your work email" required />
          </div>
        </div>

        <div id="forgotPasswordMessage" class="form-message" aria-live="polite"></div>

        <button id="sendResetCodeBtn" type="submit" class="signin-btn">Send Reset Code</button>
      </form>

      <section id="otpStep" class="otp-step" hidden aria-live="polite">
        <div class="step-card">
          <div class="step-heading">
            <h3 class="step-title">Enter Verification Code</h3>
            <p class="step-subtitle">
              Enter the 6-digit code sent to <strong id="otpEmailPreview"></strong> to continue.
            </p>
          </div>

          <div id="otpMessage" class="form-message form-message-inline"></div>

          <div id="otpGrid" class="otp-grid" role="group" aria-label="6-digit reset code">
            <input class="otp-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="Digit 1" />
            <input class="otp-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="Digit 2" />
            <input class="otp-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="Digit 3" />
            <input class="otp-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="Digit 4" />
            <input class="otp-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="Digit 5" />
            <input class="otp-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="Digit 6" />
          </div>

          <div class="otp-actions">
            <button id="verifyResetCodeBtn" type="button" class="signin-btn">Continue</button>
            <button id="resendResetCodeBtn" type="button" class="secondary-btn">Resend Code</button>
          </div>

          <div class="otp-footer-row">
            <span class="step-note">Use the latest code from your email inbox.</span>
            <button id="changeEmailBtn" type="button" class="inline-btn">Use a different email</button>
          </div>
        </div>
      </section>

      <div class="section-line"></div>

      <div class="secondary-row">
        <p>
          Already have your code?
          <a href="reset-password.html" class="text-link strong-link">Reset Password</a>
        </p>
      </div>
    </section>
  </main>

  <script type="module" src="js/auth/forgot-password.js?v=20260701a"></script>
</body>
</html>
