<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediTrust | Reset Password</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <div class="page-bg"></div>
  <div class="page-overlay"></div>

  <main class="page-shell">
    <section class="login-card">
      <header class="login-header">
        <h1 class="brand-title">MediTrust</h1>
        <div class="header-divider"></div>
        <h2 class="portal-title">Reset Password</h2>
        <p class="portal-subtitle">
          Enter your email, verification code, and a new password.
        </p>
      </header>

      <form id="resetPasswordForm" class="login-form" novalidate>
        <div class="field">
          <label for="email">Work Email</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="Enter your work email" required />
          </div>
        </div>

        <div class="field">
          <label for="code">Reset Code</label>
          <div class="input-wrap">
            <input type="text" id="code" placeholder="Enter 6-digit code" required />
          </div>
        </div>

        <div class="field">
          <label for="newPassword">New Password</label>
          <div class="input-wrap">
            <input type="password" id="newPassword" placeholder="Minimum 8 characters" required />
          </div>
          <div id="passwordRules" class="password-rules"></div>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="input-wrap">
            <input type="password" id="confirmPassword" placeholder="Re-enter new password" required />
          </div>
        </div>

        <div id="resetPasswordMessage" class="form-message" aria-live="polite"></div>

        <button type="submit" class="signin-btn">Reset Password</button>
      </form>
    </section>
  </main>

  <script type="module" src="js/auth/reset-password.js"></script>
</body>
</html>
